services:
  plataforma-dashboard:
    build: ./ml-engine
    container_name: te_plataforma_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./ml-engine:/app
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: node:18-alpine
    container_name: te_backend_api
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://postgres:root@db:5432/microemprendimientos_db
      - JWT_SECRET=super_secreto_tecnologias_emergentes
    command: sh -c "npm install && npm start"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  fastapi-api:
    build: ./fastapi-api
    container_name: te_fastapi_api
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi-api:/app
      - ./ml-engine/modelo_riesgo_definitivo.pkl:/model/modelo_riesgo_definitivo.pkl:ro
    environment:
      - DATABASE_URL=postgres://postgres:root@db:5432/microemprendimientos_db
      - MODEL_PATH=/model/modelo_riesgo_definitivo.pkl
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: te_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: microemprendimientos_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microemprendimientos_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data: